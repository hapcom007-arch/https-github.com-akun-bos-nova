name: NOVA DESKTOP (.EXE) FACTORY

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Menerima Sinyal dari Nova Offline
        uses: actions/checkout@v4

      - name: ⚙️ Membangun Kapasitas Otak (Node.js)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Menginstal Modul Kuli Awan (NPM)
        run: npm install

      - name: 🛡️ PROTOKOL SELF-VERIFICATION (10 PENGULANGAN)
        run: |
          for i in {1..10}; do
            npm run verify $i
          done
        shell: bash

      - name: 🍷 Meminum Ramuan WINE (Penerjemah Bahasa Windows)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine64 wine32

      - name: 🛠️ Pabrik Elektronik Mulai Merakit (.EXE)
        run: npm run build:exe

      - name: 🚀 Menerbitkan Aplikasi Akhir untuk Bos
        uses: actions/upload-artifact@v4
        with:
          name: Nova_Commander_Windows_Setup
          path: dist/*.exe
