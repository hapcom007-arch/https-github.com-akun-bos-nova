name: NOVA DESKTOP (.EXE) FACTORY

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Menerima Sinyal dari Nova Offline
        uses: actions/checkout@v4

      - name: ⚙️ Membangun Kapasitas Otak (Node.js)
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Menginstal Modul Kuli Awan (NPM)
        run: npm install

      - name: 🛡️ PROTOKOL SELF-VERIFICATION (10 PENGULANGAN)
        run: |
          for /l %%x in (1, 1, 10) do (
            npm run verify %%x
          )
        shell: cmd

      - name: 🛠️ Pabrik Elektronik Mulai Merakit (.EXE)
        run: npm run build:exe > build_log.txt 2>&1

      - name: 🚨 Mengirim Blackbox (Log Kematian) jika Meledak
        if: failure()
        run: |
          git config --global user.name "Ghost Protocol"
          git config --global user.email "ghost@protocol.com"
          git add build_log.txt
          git commit -m "Auto-Report: Kuli Awan Meledak (Blackbox)"
          git push
        shell: bash

      - name: 🚀 Menerbitkan Aplikasi Akhir untuk Bos
        uses: actions/upload-artifact@v4
        with:
          name: Nova_Commander_Windows_Setup
          path: dist/*.exe
