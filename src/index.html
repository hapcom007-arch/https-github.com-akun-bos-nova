<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA 1.2 - Grand Architecture Dashboard</title>
    <style>
        :root {
            --bg: rgba(10, 10, 10, 0.7); /* Transparan */
            --primary: #00ffcc;
            --danger: #ff003c;
            --text: #e0e0e0;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 15px; /* Ujung melengkung elegan */
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            -webkit-app-region: drag; /* Bisa di-drag karena frameless */
            height: 90vh;
        }
        /* Tombol dan konten tidak boleh ikut ter-drag */
        button, .core, .log-terminal {
            -webkit-app-region: no-drag;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            width: 100%;
            margin-bottom: 30px;
        }
        h1 {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
            margin: 0;
            font-size: 2.5rem;
        }
        .matrix-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            width: 90%;
            max-width: 1000px;
            margin-bottom: 30px;
        }
        .core {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 15px;
            text-align: center;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .core.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            color: var(--primary);
        }
        .core.pulse {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 5px var(--primary); }
            50% { transform: scale(1.1); box-shadow: 0 0 20px var(--primary); }
            100% { transform: scale(1); box-shadow: 0 0 5px var(--primary); }
        }
        .status-panel {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid var(--primary);
            padding: 20px;
            width: 90%;
            max-width: 1000px;
            border-radius: 8px;
        }
        .log-terminal {
            font-family: monospace;
            background: #000;
            color: #0f0;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            border-radius: 5px;
            margin-top: 15px;
        }
        button {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 10px 20px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            margin-top: 20px;
        }
        button:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px var(--primary);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NOVA 1.2 KULI AWAN DASHBOARD</h1>
        <p>Ghost Protocol: 40-Core Matrix Swarm</p>
    </div>

    <div class="matrix-container" id="matrix">
        <!-- 40 Cores di-generate lewat JS -->
    </div>

    <div class="status-panel">
        <h2 style="margin-top:0; color: var(--primary);">System Logs (Simulasi)</h2>
        <div class="log-terminal" id="logTerminal">
            > Memuat Nova 1.2 Protocol...<br>
            > Sambungan ke markas lokal stabil...<br>
        </div>
        <button id="btnSimulate">SIMULASIKAN SERANGAN 40 CORE</button>
    </div>

    <script src="app.js"></script>
    <!-- VERIFIED BY NOVA -->
</body>
</html>
